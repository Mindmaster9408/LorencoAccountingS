<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Company - Lorenco Paytime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            text-align: right;
        }

        .user-info p {
            color: #666;
            margin: 5px 0;
        }

        .user-info strong {
            color: #333;
            display: block;
            font-size: 1.1rem;
        }

        .btn-back-eco {
            padding: 10px 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-back-eco:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-logout {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #ff5252;
        }

        .btn-users {
            padding: 10px 20px;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-users:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(161,140,209,0.4);
        }

        /* ── Section labels ─────────────────────────────────────────────── */
        .section-label {
            color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding-left: 4px;
            margin-bottom: -10px;
        }

        /* ── Outer container ────────────────────────────────────────────── */
        .content {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Card grid inside each section ──────────────────────────────── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            align-items: stretch;
        }

        /* ── Company / Client cards ─────────────────────────────────────── */
        .company-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .company-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .company-card.client-card:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            border-color: #10b981;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .company-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 8px;
            margin-top: 3px;
        }

        .badge-client {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-company {
            background: #ede9fe;
            color: #5b21b6;
        }

        .company-email {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .company-details {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
            flex: 1;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .detail-label {
            color: #999;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .select-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .select-btn.client-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .select-btn:hover {
            transform: translateY(-2px);
        }

        .select-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .empty-state h2 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 20px;
        }

        .empty-state a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: #667eea;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header-right {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .user-info {
                text-align: center;
                width: 100%;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Select Company</h1>
            <div class="header-right">
                <div class="user-info">
                    <p>Welcome,</p>
                    <strong id="user-name"></strong>
                    <p id="user-role" style="font-size: 0.9rem; color: #999;"></p>
                </div>
                <button class="btn-back-eco" onclick="goBackToEco()">&#8592; Back to Ecosystem</button>
                <a href="users.html" class="btn-users" id="usersBtn" style="display: none;">👤 Users</a>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="content" id="companies-container">
            <div class="loading-state">Loading companies and clients...</div>
        </div>
    </div>

    <script src="js/polyfills.js"></script>
    <script src="js/update-check.js"></script>
    <script src="js/data-access.js"></script>
    <script src="js/permissions.js"></script>
    <script src="js/audit.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var availableCompanies = [];
        var availableClients   = [];

        // Detect which app we are serving — used for eco-client filtering.
        // This page lives in frontend-payroll so the target is always 'payroll'.
        var TARGET_APP = 'payroll';

        window.addEventListener('load', function() {
            var session = AUTH.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-name').textContent = session.name || session.email;
            var roleLabels = {
                super_admin:    'Super Admin',
                business_owner: 'Business Owner',
                accountant:     'Accountant',
                manager:        'Manager',
                admin:          'Admin'
            };
            document.getElementById('user-role').textContent = roleLabels[session.role] || session.role || '';

            var allowedRoles = ['super_admin', 'admin', 'manager', 'business_owner'];
            if (allowedRoles.includes(session.role) || session.is_super_admin) {
                document.getElementById('usersBtn').style.display = '';
            }

            loadAll();
        });

        function goBackToEco() {
            window.location.href = '/dashboard/';
        }

        async function loadAll() {
            // Run both fetches in parallel for speed.
            await Promise.all([loadDirectCompanies(), loadEcoClients()]);
            renderAll();
        }

        async function loadDirectCompanies() {
            try {
                var apiCompanies = await AUTH.getCompanies();
                if (apiCompanies && apiCompanies.length > 0) {
                    availableCompanies = apiCompanies;
                } else {
                    availableCompanies = AUTH.getCompaniesForUser ? AUTH.getCompaniesForUser() : [];
                }
            } catch(e) {
                availableCompanies = AUTH.getCompaniesForUser ? AUTH.getCompaniesForUser() : [];
            }
        }

        async function loadEcoClients() {
            try {
                // Use eco_token (ecosystem JWT = firm/practice context) when available.
                // This ensures the eco-clients query is scoped to the firm even when
                // the payroll token is scoped to a specific client company (e.g. after
                // navigating back from company-dashboard.html).
                // Falls back to payroll token for direct-login scenarios where eco_token
                // is not present (in those cases, the payroll token has FIRM_ID).
                var token = safeLocalStorage.getItem('eco_token') || safeLocalStorage.getItem('token');
                var resp = await fetch('/api/eco-clients?app=' + TARGET_APP, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                if (resp.ok) {
                    var data = await resp.json();
                    // Only include clients that have a client_company_id to SSO into.
                    availableClients = (data.clients || []).filter(function(c) {
                        return c.client_company_id || c.company_id;
                    });
                }
            } catch(e) {
                console.warn('Could not load eco-clients:', e.message);
            }
        }

        function renderAll() {
            var container = document.getElementById('companies-container');
            var session   = AUTH.getSession();
            container.innerHTML = '';

            var isSuperAdmin = session && (session.is_super_admin || session.role === 'super_admin');

            // Filter direct companies — super admins see all; others need app module enabled.
            var filteredCompanies = isSuperAdmin
                ? availableCompanies
                : availableCompanies.filter(function(c) {
                    var mods = c.modules_enabled || [];
                    return mods.includes(TARGET_APP);
                });

            // Build a set of client_company_ids already covered by direct access,
            // so we don't show duplicates.
            var directCompanyIds = new Set(filteredCompanies.map(function(c) {
                return c.id || c.company_id;
            }));

            var filteredClients = availableClients.filter(function(c) {
                var cid = c.client_company_id || c.company_id;
                return !directCompanyIds.has(cid);
            });

            var hasAnything = filteredCompanies.length > 0 || filteredClients.length > 0;

            if (!hasAnything) {
                container.innerHTML =
                    '<div class="empty-state">' +
                    '  <h2>No Companies Available</h2>' +
                    '  <p>You don\'t have any companies or clients with Paytime enabled yet.<br>' +
                    '     Enable the Payroll app on a client from the Ecosystem Dashboard.</p>' +
                    '  <a href="javascript:void(0)" onclick="goBackToEco()">Go to Ecosystem</a>' +
                    '</div>';
                return;
            }

            // ── Section: Your Companies ───────────────────────────────────
            if (filteredCompanies.length > 0) {
                var companySection = document.createElement('div');

                var companyLabel = document.createElement('div');
                companyLabel.className = 'section-label';
                companyLabel.textContent = 'Your Companies';
                companySection.appendChild(companyLabel);

                var companyGrid = document.createElement('div');
                companyGrid.className = 'cards-grid';

                filteredCompanies.forEach(function(company) {
                    var companyId   = company.id || company.company_id;
                    var companyName = company.company_name || company.trading_name || company.name || 'Unnamed';
                    var card        = buildCompanyCard(companyName, company.trading_name || '', company.role || 'member',
                                                       company.modules_enabled || [], false, companyId);
                    companyGrid.appendChild(card);
                });

                companySection.appendChild(companyGrid);
                container.appendChild(companySection);
            }

            // ── Section: Managed Clients ──────────────────────────────────
            if (filteredClients.length > 0) {
                var clientSection = document.createElement('div');

                var clientLabel = document.createElement('div');
                clientLabel.className = 'section-label';
                clientLabel.textContent = 'Managed Clients';
                clientSection.appendChild(clientLabel);

                var clientGrid = document.createElement('div');
                clientGrid.className = 'cards-grid';

                filteredClients.forEach(function(client) {
                    var companyId = client.client_company_id || client.company_id;
                    var apps      = Array.isArray(client.apps) ? client.apps.join(', ') : (client.apps || '');
                    var card      = buildClientCard(client.name || 'Unnamed Client', client.email || '',
                                                    client.client_type || 'client', apps, companyId);
                    clientGrid.appendChild(card);
                });

                clientSection.appendChild(clientGrid);
                container.appendChild(clientSection);
            }

            // ── Add company card (goes to ecosystem) ──────────────────────
            var addGrid = document.createElement('div');
            addGrid.className = 'cards-grid';

            var addCard = document.createElement('div');
            addCard.className = 'company-card';
            addCard.style.cssText = 'border: 2px dashed #10b981; align-items: center; justify-content: center; text-align: center;';
            addCard.onclick = function() { goBackToEco(); };
            addCard.innerHTML =
                '<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">' +
                '  <div style="font-size: 3rem; color: #10b981; margin-bottom: 10px;">+</div>' +
                '  <div style="font-size: 1.1rem; font-weight: 600; color: #10b981;">Add Company / Client</div>' +
                '  <div style="font-size: 0.85rem; color: #999; margin-top: 5px;">Go to Ecosystem Dashboard</div>' +
                '</div>';

            addGrid.appendChild(addCard);
            container.appendChild(addGrid);
        }

        function buildCompanyCard(name, subtitle, role, modules, isClient, companyId) {
            var card = document.createElement('div');
            card.className = 'company-card';
            card.innerHTML =
                '<div class="card-header-row">' +
                '  <div class="company-name">' + escHtml(name) + '</div>' +
                '  <span class="badge badge-company">Company</span>' +
                '</div>' +
                (subtitle ? '<div class="company-email">' + escHtml(subtitle) + '</div>' : '') +
                '<div class="company-details">' +
                '  <div class="detail-row">' +
                '    <span class="detail-label">Role:</span>' +
                '    <span class="detail-value">' + escHtml(role) + '</span>' +
                '  </div>' +
                '  <div class="detail-row">' +
                '    <span class="detail-label">Modules:</span>' +
                '    <span class="detail-value">' + escHtml(modules.join(', ') || 'none') + '</span>' +
                '  </div>' +
                '</div>' +
                '<button class="select-btn" onclick="event.stopPropagation(); selectCompany(' + companyId + ')">Select Company</button>';
            card.onclick = function() { selectCompany(companyId); };
            return card;
        }

        function buildClientCard(name, email, clientType, apps, companyId) {
            var card = document.createElement('div');
            card.className = 'company-card client-card';
            card.innerHTML =
                '<div class="card-header-row">' +
                '  <div class="company-name">' + escHtml(name) + '</div>' +
                '  <span class="badge badge-client">Client</span>' +
                '</div>' +
                (email ? '<div class="company-email">' + escHtml(email) + '</div>' : '') +
                '<div class="company-details">' +
                '  <div class="detail-row">' +
                '    <span class="detail-label">Type:</span>' +
                '    <span class="detail-value">' + escHtml(clientType || 'client') + '</span>' +
                '  </div>' +
                '  <div class="detail-row">' +
                '    <span class="detail-label">Apps:</span>' +
                '    <span class="detail-value">' + escHtml(apps || 'payroll') + '</span>' +
                '  </div>' +
                '</div>' +
                '<button class="select-btn client-btn" onclick="event.stopPropagation(); selectCompany(' + companyId + ')">Open in Paytime</button>';
            card.onclick = function() { selectCompany(companyId); };
            return card;
        }

        function escHtml(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function selectCompany(companyId) {
            // Use sso-launch instead of select-company so that non-superadmin
            // practice users (accountants, payroll admins) can SSO into client
            // companies via the eco_client chain — select-company only allows
            // direct user_company_access members.
            try {
                var token = safeLocalStorage.getItem('token');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                var res = await fetch('/api/auth/sso-launch', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ targetApp: 'payroll', companyId: companyId })
                });

                var data = await res.json();
                if (!res.ok) {
                    alert('Failed to select company: ' + (data.error || 'Unknown error'));
                    return;
                }

                // Store the SSO-issued app token (scoped to this company)
                safeLocalStorage.setItem('token', data.appToken);
                if (data.user) safeLocalStorage.setItem('user', JSON.stringify(data.user));
                if (data.company) safeLocalStorage.setItem('company', JSON.stringify(data.company));

                // Update session with new company context
                var session = AUTH.getSession() || {};
                session.company_id = companyId;
                if (data.company) {
                    session.role = data.company.role || session.role;
                    session.company_name = data.company.trading_name || data.company.company_name || session.company_name;
                }
                AUTH.setSession(session);

                window.location.href = 'company-dashboard.html';
            } catch (e) {
                alert('Failed to select company: ' + e.message);
            }
        }

        function handleLogout() {
            AUTH.logout();
        }
    </script>

    <script src="js/mobile-utils.js"></script>
</body>
</html>
