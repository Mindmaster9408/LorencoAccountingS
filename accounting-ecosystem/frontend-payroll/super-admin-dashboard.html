<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platform Control Centre - Lorenco</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* ── Header ─────────────────────────────────────────────────────── */
        .header {
            background: white;
            padding: 24px 30px;
            border-radius: 15px;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left h1 { color: #667eea; font-size: 1.8rem; }
        .header-left p  { color: #999; font-size: 0.85rem; margin-top: 2px; }
        .header-right   { display: flex; align-items: center; gap: 12px; }
        .badge-admin {
            background: #667eea; color: white; padding: 4px 12px;
            border-radius: 20px; font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.05em;
        }
        .btn-eco {
            padding: 9px 16px; background: #10b981; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-eco:hover { background: #059669; transform: translateY(-1px); }
        .btn-logout {
            padding: 9px 16px; background: #ff6b6b; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: #ff5252; }

        /* ── Stats bar ─────────────────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-card.green  { border-top: 4px solid #10b981; }
        .stat-card.red    { border-top: 4px solid #ef4444; }
        .stat-card.blue   { border-top: 4px solid #667eea; }
        .stat-card.orange { border-top: 4px solid #f59e0b; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #667eea; margin: 8px 0 4px; }
        .stat-label  { color: #999; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── Toolbar ───────────────────────────────────────────────────── */
        .toolbar {
            background: white; padding: 16px 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .toolbar input {
            flex: 1; min-width: 200px; padding: 10px 14px; border: 2px solid #eee;
            border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s;
        }
        .toolbar input:focus { outline: none; border-color: #667eea; }
        .filter-tabs { display: flex; gap: 6px; }
        .filter-tab {
            padding: 8px 16px; border: 2px solid #e5e7eb; border-radius: 8px;
            background: white; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            color: #666; transition: all 0.2s;
        }
        .filter-tab.active {
            background: #667eea; border-color: #667eea; color: white;
        }
        .btn-refresh {
            padding: 9px 16px; background: #f8f9fa; border: 2px solid #e5e7eb;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            color: #666; transition: all 0.2s;
        }
        .btn-refresh:hover { background: #e9efff; border-color: #667eea; color: #667eea; }

        /* ── Hierarchy panel ───────────────────────────────────────────── */
        .hierarchy-panel {
            background: white; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;
        }
        .hierarchy-panel-header {
            padding: 20px 24px; border-bottom: 2px solid #f3f4f6;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hierarchy-panel-header h2 { color: #667eea; font-size: 1.1rem; font-weight: 700; }
        .result-count { color: #999; font-size: 0.85rem; }

        /* ── Account Holder row ────────────────────────────────────────── */
        .holder-row {
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.15s;
        }
        .holder-row:last-child { border-bottom: none; }
        .holder-header {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 24px; cursor: pointer; user-select: none;
        }
        .holder-header:hover { background: #f8f9ff; }
        .expand-icon {
            color: #667eea; font-size: 0.9rem; width: 18px; text-align: center;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .holder-row.expanded .expand-icon { transform: rotate(90deg); }
        .holder-name { font-weight: 700; color: #1f2937; font-size: 1rem; flex: 1; min-width: 0; }
        .holder-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .type-pill {
            font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
        }
        .type-practice { background: #ede9fe; color: #5b21b6; }
        .type-business  { background: #d1fae5; color: #065f46; }
        .type-other     { background: #fef3c7; color: #78350f; }
        .holder-stats   { color: #666; font-size: 0.82rem; white-space: nowrap; }
        .status-pill {
            font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 12px;
            white-space: nowrap;
        }
        .status-active   { background: #d1fae5; color: #065f46; }
        .status-inactive { background: #fee2e2; color: #991b1b; }
        .holder-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-sm {
            padding: 5px 12px; border: none; border-radius: 6px; font-size: 0.78rem;
            font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .btn-suspend  { background: #fef3c7; color: #92400e; }
        .btn-suspend:hover  { background: #f59e0b; color: white; }
        .btn-activate { background: #d1fae5; color: #065f46; }
        .btn-activate:hover { background: #10b981; color: white; }

        /* ── Client list inside account holder ─────────────────────────── */
        .clients-container { display: none; background: #fafbff; border-top: 1px solid #f3f4f6; }
        .holder-row.expanded .clients-container { display: block; }

        .no-clients-msg {
            padding: 16px 60px; color: #999; font-size: 0.88rem; font-style: italic;
        }

        .client-row {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 24px 12px 56px; border-bottom: 1px solid #eef0f4;
        }
        .client-row:last-child { border-bottom: none; }
        .client-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .client-dot.active   { background: #10b981; }
        .client-dot.inactive { background: #ef4444; }
        .client-name { font-weight: 600; color: #374151; font-size: 0.92rem; flex: 1; min-width: 0; }
        .client-email { color: #9ca3af; font-size: 0.8rem; }
        .apps-chips { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; }
        .app-chip {
            font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .app-pos         { background: #dbeafe; color: #1e40af; }
        .app-payroll     { background: #ede9fe; color: #5b21b6; }
        .app-accounting  { background: #fce7f3; color: #9d174d; }
        .app-sean        { background: #d1fae5; color: #065f46; }
        .app-coaching    { background: #fff7ed; color: #92400e; }
        .app-default     { background: #f3f4f6; color: #374151; }
        .client-emp-count { color: #6b7280; font-size: 0.8rem; white-space: nowrap; }

        /* ── Loading / empty states ────────────────────────────────────── */
        .state-box {
            padding: 60px 20px; text-align: center; color: #667eea;
        }
        .state-box p    { margin-top: 10px; color: #999; font-size: 0.9rem; }
        .state-box span { font-size: 2rem; }

        /* ── Modals ─────────────────────────────────────────────────────── */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white; padding: 36px; border-radius: 15px;
            max-width: 500px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; padding-bottom: 14px; border-bottom: 2px solid #eee;
        }
        .modal-header h3 { color: #667eea; font-size: 1.3rem; }
        .close-btn {
            background: none; border: none; font-size: 1.4rem; color: #999;
            cursor: pointer;
        }
        .modal-body p { color: #555; line-height: 1.6; margin: 8px 0; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-modal {
            padding: 10px 22px; border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel  { background: #eee; color: #333; }
        .btn-cancel:hover  { background: #ddd; }
        .btn-confirm { background: #667eea; color: white; }
        .btn-confirm:hover { background: #5568d3; }
        .btn-confirm.danger { background: #ef4444; }
        .btn-confirm.danger:hover { background: #dc2626; }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .header-right { width: 100%; justify-content: center; flex-wrap: wrap; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .holder-header { padding: 14px 16px; }
            .holder-meta, .holder-actions { flex-direction: column; align-items: flex-start; }
            .client-row { padding-left: 30px; flex-wrap: wrap; gap: 6px; }
        }
    </style>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>⚙️ Platform Control Centre</h1>
            <p>All account holders · Billing &amp; admin oversight · Platform-wide scope</p>
        </div>
        <div class="header-right">
            <span class="badge-admin">SUPER ADMIN</span>
            <button class="btn-eco" onclick="window.location.href='/dashboard/'">← Ecosystem</button>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-grid">
        <div class="stat-card blue">
            <div class="stat-label">Account Holders</div>
            <div class="stat-number" id="stat-holders">—</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Total Clients</div>
            <div class="stat-number" id="stat-clients">—</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-label">Active Employees</div>
            <div class="stat-number" id="stat-employees">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Apps</div>
            <div class="stat-number" id="stat-apps">—</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Active Holders</div>
            <div class="stat-number" id="stat-active">—</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Inactive Holders</div>
            <div class="stat-number" id="stat-inactive">—</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search account holders or clients..."
               oninput="applyFilters()">
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all"      onclick="setFilter('all')">All</button>
            <button class="filter-tab"         data-filter="active"   onclick="setFilter('active')">Active</button>
            <button class="filter-tab"         data-filter="inactive" onclick="setFilter('inactive')">Inactive</button>
        </div>
        <button class="btn-refresh" onclick="loadDashboard()">↻ Refresh</button>
    </div>

    <!-- Hierarchy panel -->
    <div class="hierarchy-panel">
        <div class="hierarchy-panel-header">
            <h2>Account Holders</h2>
            <span class="result-count" id="result-count"></span>
        </div>
        <div id="hierarchy-body">
            <div class="state-box"><span>⏳</span><p>Loading platform data…</p></div>
        </div>
    </div>

</div>

<!-- Confirm modal -->
<div id="confirm-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="confirm-title">Confirm Action</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="confirm-body"></div>
        <div class="modal-footer">
            <button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-modal btn-confirm" id="confirm-ok" onclick="runConfirmedAction()">Confirm</button>
        </div>
    </div>
</div>

<script src="js/polyfills.js"></script>
<script src="js/update-check.js"></script>
<script src="js/data-access.js"></script>
<script src="js/permissions.js"></script>
<script src="js/audit.js"></script>
<script src="js/auth.js"></script>
<script>
// ─── Platform Control Centre ──────────────────────────────────────────────────
// Data source: LIVE API — no localStorage cache dependency.
// Scope:       ALL companies + ALL eco-clients (super admin sees everything).
// Hierarchy:   Account Holder → Clients → Apps

var allHolders      = [];   // account holder companies after client_company_id exclusion
var filteredHolders = [];   // after search + status filter
var clientsByHolder = {};   // { company_id: [eco_client, ...] }
var billingByClient = {};   // { eco_client_id: N } from payroll-billing-summary

var currentFilter   = 'all';
var pendingAction   = null; // { companyId, action: 'suspend' | 'activate', name }

// ─── Auth guard ───────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
    var session = AUTH.getSession();
    if (!session || !(session.is_super_admin || session.role === 'super_admin')) {
        window.location.href = 'login.html';
        return;
    }
    loadDashboard();
});

// ─── API helper ──────────────────────────────────────────────────────────────
function apiGet(path) {
    var token = safeLocalStorage.getItem('token');
    return fetch('/api' + path, {
        headers: { 'Authorization': 'Bearer ' + token }
    }).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    });
}

function apiPut(path, body) {
    var token   = safeLocalStorage.getItem('token');
    var session = AUTH.getSession();
    var headers = {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
    };
    // Provide company context via header — required by requireCompany middleware
    if (session && session.company_id) {
        headers['X-Company-Id'] = String(session.company_id);
    }
    return fetch('/api' + path, {
        method: 'PUT',
        headers: headers,
        body: JSON.stringify(body)
    }).then(function(r) {
        if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'HTTP ' + r.status); });
        return r.json();
    });
}

// ─── Data loading ─────────────────────────────────────────────────────────────
function loadDashboard() {
    document.getElementById('hierarchy-body').innerHTML =
        '<div class="state-box"><span>⏳</span><p>Loading platform data…</p></div>';
    resetStats();

    // Three parallel API calls — platform admin scope
    Promise.all([
        apiGet('/companies'),                              // ALL companies
        apiGet('/eco-clients?status=all'),                 // ALL eco-clients
        apiGet('/eco-clients/payroll-billing-summary')     // employee counts
            .catch(function() { return { summary: {}, by_client_id: {} }; })
    ]).then(function(results) {
        var companiesData = results[0];
        var clientsData   = results[1];
        var billingData   = results[2];

        var allCompanies = companiesData.companies || [];
        var allClients   = clientsData.clients   || [];

        // Build billing index by eco_client_id (preferred) then by company_id (fallback)
        billingByClient = billingData.by_client_id || {};
        var billingByCompany = (billingData.summary || {});

        // ── Determine account holders ────────────────────────────────────────
        // client_company_id values = isolated data companies (NOT account holders).
        // Everything else in the companies table is an account holder.
        var clientCompanyIdSet = new Set();
        allClients.forEach(function(c) {
            if (c.client_company_id) clientCompanyIdSet.add(Number(c.client_company_id));
        });

        allHolders = allCompanies.filter(function(c) {
            return !clientCompanyIdSet.has(Number(c.id));
        });

        // ── Group eco-clients by their managing company (account holder) ─────
        clientsByHolder = {};
        allClients.forEach(function(client) {
            var hid = client.company_id;
            if (!hid) return;
            if (!clientsByHolder[hid]) clientsByHolder[hid] = [];
            // Attach employee count for easy rendering
            client._employees = billingByClient[client.id]
                || billingByCompany[client.client_company_id] && billingByCompany[client.client_company_id].active_employees
                || 0;
            clientsByHolder[hid].push(client);
        });

        renderStats(allHolders, allClients);
        applyFilters();

    }).catch(function(err) {
        console.error('Platform Control Centre load error:', err);
        document.getElementById('hierarchy-body').innerHTML =
            '<div class="state-box"><span>⚠️</span>' +
            '<p>Failed to load platform data: ' + escHtml(err.message) + '</p>' +
            '<p><button class="btn-eco" style="margin-top:12px" onclick="loadDashboard()">Retry</button></p>' +
            '</div>';
    });
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function resetStats() {
    ['stat-holders','stat-clients','stat-employees','stat-apps','stat-active','stat-inactive']
        .forEach(function(id) { document.getElementById(id).textContent = '—'; });
}

function renderStats(holders, clients) {
    var totalEmp   = 0;
    var totalApps  = 0;
    var activeH    = 0;
    var inactiveH  = 0;

    holders.forEach(function(h) {
        if (h.is_active !== false) activeH++; else inactiveH++;
    });

    clients.forEach(function(c) {
        totalEmp  += (c._employees || 0);
        totalApps += (Array.isArray(c.apps) ? c.apps.length : 0);
    });

    document.getElementById('stat-holders').textContent   = holders.length;
    document.getElementById('stat-clients').textContent   = clients.length;
    document.getElementById('stat-employees').textContent = totalEmp;
    document.getElementById('stat-apps').textContent      = totalApps;
    document.getElementById('stat-active').textContent    = activeH;
    document.getElementById('stat-inactive').textContent  = inactiveH;
}

// ─── Filtering ────────────────────────────────────────────────────────────────
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === f);
    });
    applyFilters();
}

function applyFilters() {
    var term = (document.getElementById('search-input').value || '').toLowerCase().trim();

    filteredHolders = allHolders.filter(function(h) {
        // Status filter
        if (currentFilter === 'active'   && h.is_active === false) return false;
        if (currentFilter === 'inactive' && h.is_active !== false) return false;

        // Search: account holder name/email match
        if (term) {
            var nameMatch  = (h.company_name  || '').toLowerCase().includes(term);
            var emailMatch = (h.contact_email || h.email || '').toLowerCase().includes(term);
            // Also search across client names under this holder
            var clients    = clientsByHolder[h.id] || [];
            var clientMatch = clients.some(function(c) {
                return (c.name  || '').toLowerCase().includes(term) ||
                       (c.email || '').toLowerCase().includes(term);
            });
            if (!nameMatch && !emailMatch && !clientMatch) return false;
        }

        return true;
    });

    renderHierarchy();
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function renderHierarchy() {
    var body = document.getElementById('hierarchy-body');

    if (allHolders.length === 0) {
        body.innerHTML = '<div class="state-box"><span>📭</span><p>No account holders found on the platform.</p></div>';
        document.getElementById('result-count').textContent = '';
        return;
    }

    if (filteredHolders.length === 0) {
        body.innerHTML = '<div class="state-box"><span>🔍</span><p>No account holders match the current filter.</p></div>';
        document.getElementById('result-count').textContent = '0 of ' + allHolders.length + ' shown';
        return;
    }

    document.getElementById('result-count').textContent =
        filteredHolders.length + ' of ' + allHolders.length + ' shown';

    body.innerHTML = '';

    filteredHolders.forEach(function(holder) {
        body.appendChild(buildHolderRow(holder));
    });
}

function buildHolderRow(holder) {
    var clients    = clientsByHolder[holder.id] || [];
    var isActive   = holder.is_active !== false;
    var name       = holder.company_name || holder.trading_name || 'Unnamed';
    var email      = holder.contact_email || holder.email || '';
    var holderType = determineHolderType(holder, clients);

    // Employee total for this account holder
    var empCount = clients.reduce(function(sum, c) { return sum + (c._employees || 0); }, 0);

    var row = document.createElement('div');
    row.className = 'holder-row';
    row.dataset.id = holder.id;

    // ── Row header ────────────────────────────────────────────────────────────
    var header = document.createElement('div');
    header.className = 'holder-header';
    header.onclick = function() { toggleHolder(row); };

    header.innerHTML =
        '<span class="expand-icon">▶</span>' +
        '<div class="holder-name">' + escHtml(name) + (email ? '<br><span style="font-weight:400;color:#9ca3af;font-size:0.8rem;">' + escHtml(email) + '</span>' : '') + '</div>' +
        '<div class="holder-meta">' +
            '<span class="type-pill ' + holderType.cls + '">' + holderType.label + '</span>' +
            '<span class="holder-stats">' + clients.length + ' client' + (clients.length !== 1 ? 's' : '') + ' · ' + empCount + ' emp' + '</span>' +
            '<span class="status-pill ' + (isActive ? 'status-active' : 'status-inactive') + '">' + (isActive ? 'Active' : 'Inactive') + '</span>' +
        '</div>' +
        '<div class="holder-actions">' +
            (isActive
                ? '<button class="btn-sm btn-suspend"  onclick="event.stopPropagation(); confirmToggle(' + holder.id + ', \'suspend\', \'' + escAttr(name) + '\')"  >Suspend</button>'
                : '<button class="btn-sm btn-activate" onclick="event.stopPropagation(); confirmToggle(' + holder.id + ', \'activate\', \'' + escAttr(name) + '\')">Activate</button>'
            ) +
        '</div>';

    row.appendChild(header);

    // ── Client list (hidden until expanded) ───────────────────────────────────
    var clientsContainer = document.createElement('div');
    clientsContainer.className = 'clients-container';

    if (clients.length === 0) {
        clientsContainer.innerHTML = '<div class="no-clients-msg">No clients yet.</div>';
    } else {
        clients.forEach(function(client) {
            clientsContainer.appendChild(buildClientRow(client));
        });
    }

    row.appendChild(clientsContainer);
    return row;
}

function buildClientRow(client) {
    var isActive = client.is_active !== false;
    var apps     = Array.isArray(client.apps) ? client.apps : [];

    var row = document.createElement('div');
    row.className = 'client-row';

    var chipsHtml = apps.map(function(app) {
        return '<span class="app-chip ' + appChipClass(app) + '">' + escHtml(app) + '</span>';
    }).join('');
    if (!chipsHtml) chipsHtml = '<span style="color:#ccc; font-size:0.78rem;">no apps</span>';

    row.innerHTML =
        '<span class="client-dot ' + (isActive ? 'active' : 'inactive') + '"></span>' +
        '<div style="flex:1; min-width:0;">' +
            '<div class="client-name">' + escHtml(client.name || 'Unnamed') + '</div>' +
            (client.email ? '<div class="client-email">' + escHtml(client.email) + '</div>' : '') +
        '</div>' +
        '<div class="apps-chips">' + chipsHtml + '</div>' +
        '<div class="client-emp-count">' + (client._employees || 0) + ' emp</div>';

    return row;
}

// ─── Account holder type determination ───────────────────────────────────────
function determineHolderType(holder, clients) {
    // A holder is considered an Accounting Practice if it manages other clients
    // OR if it's the platform super-admin company.
    var mods = Array.isArray(holder.modules_enabled) ? holder.modules_enabled : [];
    if (clients.length > 0) {
        return { label: 'Accounting Practice', cls: 'type-practice' };
    }
    if (mods.includes('pos') && !mods.includes('payroll') && !mods.includes('accounting')) {
        return { label: 'Business', cls: 'type-business' };
    }
    if (mods.length > 0) {
        return { label: 'Accounting Practice', cls: 'type-practice' };
    }
    return { label: 'Account Holder', cls: 'type-other' };
}

function appChipClass(app) {
    var map = { pos: 'app-pos', payroll: 'app-payroll', accounting: 'app-accounting', sean: 'app-sean', coaching: 'app-coaching' };
    return map[app] || 'app-default';
}

// ─── Expand / collapse ────────────────────────────────────────────────────────
function toggleHolder(row) {
    row.classList.toggle('expanded');
}

// ─── Suspend / Activate ───────────────────────────────────────────────────────
function confirmToggle(companyId, action, name) {
    pendingAction = { companyId: companyId, action: action, name: name };

    var isSuspend = action === 'suspend';
    document.getElementById('confirm-title').textContent = isSuspend ? 'Suspend Account Holder' : 'Activate Account Holder';
    document.getElementById('confirm-body').innerHTML =
        '<p>Are you sure you want to <strong>' + (isSuspend ? 'suspend' : 'activate') + '</strong> the following account holder?</p>' +
        '<p style="margin-top:14px; padding:14px; background:#f8f9fa; border-radius:8px;"><strong>' + escHtml(name) + '</strong></p>' +
        (isSuspend ? '<p style="margin-top:12px; color:#dc2626;"><strong>⚠️</strong> This will suspend access for all users of this account until reactivated.</p>' : '');

    var confirmBtn = document.getElementById('confirm-ok');
    confirmBtn.className = 'btn-modal btn-confirm' + (isSuspend ? ' danger' : '');
    confirmBtn.textContent = isSuspend ? 'Suspend' : 'Activate';

    document.getElementById('confirm-modal').classList.add('show');
}

function runConfirmedAction() {
    if (!pendingAction) return;
    var isActive = pendingAction.action === 'activate';
    closeModal();

    apiPut('/companies/' + pendingAction.companyId, { is_active: isActive })
        .then(function() {
            loadDashboard();
        })
        .catch(function(err) {
            alert('Failed to update status: ' + err.message);
        });
}

function closeModal() {
    document.getElementById('confirm-modal').classList.remove('show');
    pendingAction = null;
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ─── Logout ──────────────────────────────────────────────────────────────────
function handleLogout() {
    if (confirm('Are you sure you want to logout?')) AUTH.logout();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
    return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
</script>
<script src="js/mobile-utils.js"></script>
</body>
</html>
