<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner Review Packs — Lorenco Practice</title>
    <link rel="stylesheet" href="/practice/css/layout.css" />
    <style>
        body { background: #1a1a2e; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .page-content { padding: 24px; max-width: 1400px; margin: 0 auto; }

        .inline-msg { padding: 10px 14px; border-radius: 8px; font-size: .82rem; margin-bottom: 16px; }
        .inline-msg.info { background: rgba(102,126,234,.1); color: #a3bffa; border: 1px solid rgba(102,126,234,.2); }
        .inline-msg.warn { background: rgba(246,173,85,.12); color: #f6ad55; border: 1px solid rgba(246,173,85,.25); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .summary-card { background: #1e2035; border-radius: 10px; padding: 14px 16px; text-align: center; cursor: pointer; }
        .sc-count { font-size: 1.6rem; font-weight: 800; color: #e2e8f0; }
        .sc-label { font-size: .72rem; color: #718096; margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

        .filter-bar { background: #1e2035; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .filter-bar input, .filter-bar select { background: #12122a; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; padding: 7px 10px; font-size: .82rem; }
        .filter-group { display: flex; flex-direction: column; gap: 3px; }
        .filter-label { font-size: .7rem; color: #718096; text-transform: uppercase; letter-spacing: .04em; }
        .btn-filter { background: #667eea; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-filter-clear { background: #2d3748; color: #a0aec0; border: none; border-radius: 6px; padding: 8px 14px; font-size: .82rem; cursor: pointer; }
        .btn-add { background: #48bb78; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: .85rem; font-weight: 700; cursor: pointer; }
        .btn-add:hover { background: #38a169; }

        .table-wrap { background: #1e2035; border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #12122a; color: #a0aec0; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; padding: 10px 14px; text-align: left; }
        td { padding: 10px 14px; font-size: .82rem; border-bottom: 1px solid #12122a; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #252840; cursor: pointer; }
        .empty-row td { text-align: center; color: #4a5568; padding: 32px; }

        .pill { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
        .st-draft, .st-generated  { background: rgba(102,126,234,.2);  color: #818cf8; }
        .st-under_review         { background: rgba(246,173,85,.2);   color: #f6ad55; }
        .st-approved             { background: rgba(104,211,145,.2);  color: #68d391; }
        .st-rejected             { background: rgba(252,129,74,.2);  color: #fc8181; }
        .st-archived, .st-cancelled { background: rgba(74,85,104,.3); color: #718096; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #1e2035; border-radius: 14px; padding: 28px; width: 90%; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .modal-sm { max-width: 480px; }
        .modal-md { max-width: 680px; }
        .modal-lg { max-width: 980px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #e2e8f0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: .78rem; color: #a0aec0; }
        input[type="text"], input[type="date"], input[type="number"], select, textarea {
            background: #12122a; border: 1px solid #2d3748; border-radius: 7px;
            color: #e2e8f0; padding: 8px 11px; font-size: .85rem; width: 100%; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 70px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

        .btn-action { padding: 8px 16px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-action:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary   { background: #667eea; color: #fff; }
        .btn-secondary { background: #2d3748; color: #e2e8f0; }
        .btn-success   { background: #48bb78; color: #fff; }
        .btn-danger    { background: #e53e3e; color: #fff; }
        .btn-warning   { background: #ed8936; color: #fff; }
        .btn-sm        { padding: 5px 11px; font-size: .78rem; }

        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: #12122a; border: none; color: #718096; padding: 7px 16px; border-radius: 7px; font-size: .82rem; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #667eea; color: #fff; }
        .tab-content { padding: 4px 0; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .detail-row  { display: flex; flex-direction: column; padding: 8px 12px; border-bottom: 1px solid #12122a; }
        .detail-label { font-size: .72rem; color: #718096; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
        .detail-value { font-size: .85rem; color: #e2e8f0; }
        .section-label { font-size: .72rem; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin: 14px 0 6px; }

        .event-item { background: #12122a; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; }
        .event-header { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
        .event-type { font-size: .78rem; font-weight: 700; color: #a0aec0; }
        .event-time { font-size: .72rem; color: #4a5568; margin-left: auto; }
        .event-notes { font-size: .78rem; color: #718096; font-style: italic; }

        .loading-state { text-align: center; color: #4a5568; padding: 20px; font-size: .85rem; }
    </style>
</head>
<body>
    <div id="app-topbar"></div>
    <nav id="app-nav"></nav>

    <div class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h1 style="font-size:1.3rem;font-weight:700;margin:0;">Partner Review Packs</h1>
            <button class="btn-add" onclick="prpOpenGenerate()">+ Generate Pack</button>
        </div>
        <div class="inline-msg info">
            Deterministic management reporting and partner sign-off only. Not AI. Not forecasting. Not automated email reporting.
        </div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <select id="filterStatus" onchange="prpLoadList()">
                    <option value="">All Statuses</option>
                    <option value="draft">Draft</option>
                    <option value="generated">Generated</option>
                    <option value="under_review">Under Review</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                    <option value="archived">Archived</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Period From</span>
                <input type="date" id="filterFrom" onchange="prpLoadList()" />
            </div>
            <div class="filter-group">
                <span class="filter-label">Period To</span>
                <input type="date" id="filterTo" onchange="prpLoadList()" />
            </div>
            <div class="filter-group">
                <span class="filter-label">&nbsp;</span>
                <div style="display:flex;gap:6px;">
                    <button class="btn-filter" onclick="prpLoadList()">Search</button>
                    <button class="btn-filter-clear" onclick="prpClearFilters()">Clear</button>
                </div>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>#</th><th>Status</th><th>Name</th><th>Period</th><th>Prepared</th><th>Reviewed</th><th>Approved</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="7">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination" style="text-align:center;margin-top:14px;font-size:.82rem;color:#718096;"></div>
    </div>

    <!-- ── Generate Pack Modal ────────────────────────────────────────────── -->
    <div class="modal-overlay" id="generateModal">
        <div class="modal-box modal-md">
            <div class="modal-title">Generate Partner Review Pack</div>
            <div class="form-row">
                <div class="form-group full">
                    <label>Pack Name *</label>
                    <input type="text" id="genName" placeholder="e.g. July 2026 Partner Review" />
                </div>
                <div class="form-group">
                    <label>Period Start *</label>
                    <input type="date" id="genPeriodStart" />
                </div>
                <div class="form-group">
                    <label>Period End *</label>
                    <input type="date" id="genPeriodEnd" />
                </div>
                <div class="form-group full">
                    <label>Period Key</label>
                    <input type="text" id="genPeriodKey" placeholder="e.g. 2026-07 (optional — enables duplicate protection)" />
                </div>
                <div class="form-group">
                    <label>Snapshot Start ID</label>
                    <input type="text" id="genSnapshotStart" placeholder="Optional — auto-selected if blank" />
                </div>
                <div class="form-group">
                    <label>Snapshot End ID</label>
                    <input type="text" id="genSnapshotEnd" placeholder="Optional — auto-selected if blank" />
                </div>
                <div class="form-group full">
                    <label>Executive Summary</label>
                    <textarea id="genSummary" placeholder="Optional — can be added later"></textarea>
                </div>
                <div class="form-group full">
                    <label>Notes</label>
                    <textarea id="genNotes" placeholder="Optional"></textarea>
                </div>
            </div>
            <div id="generateWarning"></div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="prpCloseGenerate()">Cancel</button>
                <button class="btn-action btn-primary" id="generateSubmitBtn" onclick="prpSubmitGenerate()">Generate Pack</button>
            </div>
        </div>
    </div>

    <!-- ── Detail Modal ───────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box modal-lg">
            <div id="detailTabBar" class="tab-bar"></div>
            <div id="detailBody" style="min-height:200px;"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>

    <!-- ── Reject Modal ───────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="rejectModal">
        <div class="modal-box modal-sm">
            <div class="modal-title">Reject Pack</div>
            <div class="form-group">
                <label>Rejection Reason *</label>
                <textarea id="rejectReason" placeholder="Why is this pack being rejected?"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="prpCloseReject()">Cancel</button>
                <button class="btn-action btn-danger" onclick="prpSubmitReject()">Reject</button>
            </div>
        </div>
    </div>

    <script src="/practice/js/polyfills.js"></script>
    <script src="/practice/js/auth.js"></script>
    <script src="/practice/js/api.js"></script>
    <script src="/practice/js/layout.js"></script>
    <script src="/practice/js/partner-review-packs.js"></script>
    <script>LAYOUT.init('partner-review-packs');</script>
</body>
</html>
