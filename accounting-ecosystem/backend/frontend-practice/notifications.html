<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications — Lorenco Practice</title>
    <link rel="stylesheet" href="/practice/css/layout.css" />
    <style>
        body { background: #1a1a2e; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .page-content { padding: 24px; max-width: 1400px; margin: 0 auto; }

        .inline-msg { padding: 10px 14px; border-radius: 8px; font-size: .82rem; margin-bottom: 16px; }
        .inline-msg.info { background: rgba(102,126,234,.1); color: #a3bffa; border: 1px solid rgba(102,126,234,.2); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .summary-card { background: #1e2035; border-radius: 10px; padding: 14px 16px; text-align: center; cursor: pointer; }
        .summary-card.active { outline: 2px solid #667eea; }
        .sc-count { font-size: 1.6rem; font-weight: 800; color: #e2e8f0; }
        .sc-label { font-size: .72rem; color: #718096; margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

        .filter-bar { background: #1e2035; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .filter-bar input, .filter-bar select { background: #12122a; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; padding: 7px 10px; font-size: .82rem; }
        .filter-group { display: flex; flex-direction: column; gap: 3px; }
        .filter-label { font-size: .7rem; color: #718096; text-transform: uppercase; letter-spacing: .04em; }
        .btn-filter { background: #667eea; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-filter-clear { background: #2d3748; color: #a0aec0; border: none; border-radius: 6px; padding: 8px 14px; font-size: .82rem; cursor: pointer; }

        .bulk-bar { display: none; background: #252840; border-radius: 10px; padding: 10px 16px; margin-bottom: 14px; align-items: center; gap: 10px; font-size: .82rem; }
        .bulk-bar.open { display: flex; }

        .inbox-list { display: flex; flex-direction: column; gap: 8px; }
        .notif-row { background: #1e2035; border-radius: 10px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; border-left: 3px solid transparent; }
        .notif-row.st-new { border-left-color: #667eea; }
        .notif-row:hover { background: #252840; }
        .notif-check { margin-top: 3px; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .notif-title { font-weight: 700; font-size: .88rem; }
        .notif-msg { font-size: .8rem; color: #a0aec0; margin-top: 3px; }
        .notif-meta { font-size: .72rem; color: #718096; margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; }
        .empty-state { text-align: center; color: #4a5568; padding: 48px; background: #1e2035; border-radius: 12px; }

        .pill { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: .7rem; font-weight: 700; white-space: nowrap; }
        .sev-info     { background: rgba(160,174,192,.2); color: #a0aec0; }
        .sev-low      { background: rgba(104,211,145,.2); color: #68d391; }
        .sev-medium   { background: rgba(246,173,85,.2);  color: #f6ad55; }
        .sev-high     { background: rgba(252,129,74,.2);  color: #fc8181; }
        .sev-critical { background: rgba(229,62,62,.25);  color: #feb2b2; }
        .st-pill-new       { background: rgba(102,126,234,.2); color: #818cf8; }
        .st-pill-read      { background: rgba(74,85,104,.3);  color: #a0aec0; }
        .st-pill-snoozed   { background: rgba(246,173,85,.2); color: #f6ad55; }
        .st-pill-completed { background: rgba(104,211,145,.2); color: #68d391; }
        .st-pill-archived  { background: rgba(74,85,104,.3);  color: #718096; }
        .st-pill-cancelled { background: rgba(74,85,104,.3);  color: #718096; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #1e2035; border-radius: 14px; padding: 28px; width: 90%; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .modal-sm { max-width: 440px; }
        .modal-md { max-width: 640px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #e2e8f0; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        label { font-size: .78rem; color: #a0aec0; }
        input[type="text"], input[type="datetime-local"], select, textarea {
            background: #12122a; border: 1px solid #2d3748; border-radius: 7px;
            color: #e2e8f0; padding: 8px 11px; font-size: .85rem; width: 100%; box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 60px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
        .btn-action { padding: 8px 16px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-action:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary   { background: #667eea; color: #fff; }
        .btn-secondary { background: #2d3748; color: #e2e8f0; }
        .btn-success   { background: #48bb78; color: #fff; }
        .btn-danger    { background: #e53e3e; color: #fff; }
        .btn-warning   { background: #ed8936; color: #fff; }
        .btn-add       { background: #48bb78; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: .85rem; font-weight: 700; cursor: pointer; }

        .event-item { background: #12122a; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; }
        .event-header { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
        .event-type { font-size: .78rem; font-weight: 700; color: #a0aec0; }
        .event-time { font-size: .72rem; color: #4a5568; margin-left: auto; }
    </style>
</head>
<body>
    <div id="app-topbar"></div>
    <nav id="app-nav"></nav>

    <div class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h1 style="font-size:1.3rem;font-weight:700;margin:0;">Notifications</h1>
            <button class="btn-add" onclick="ntOpenCreate()">+ New Notification</button>
        </div>
        <div class="inline-msg info">
            Internal notification centre only. Not email, SMS, push, or Teams. Refreshes on load — no live updates.
        </div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <select id="filterStatus" onchange="ntLoadList()">
                    <option value="">All</option>
                    <option value="new">New</option>
                    <option value="read">Read</option>
                    <option value="snoozed">Snoozed</option>
                    <option value="completed">Completed</option>
                    <option value="archived">Archived</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Category</span>
                <select id="filterCategory" onchange="ntLoadList()">
                    <option value="">All</option>
                    <option value="risk">Risk</option>
                    <option value="tax">Tax</option>
                    <option value="billing">Billing</option>
                    <option value="workflow">Workflow</option>
                    <option value="capacity">Capacity</option>
                    <option value="client">Client</option>
                    <option value="documents">Documents</option>
                    <option value="compliance">Compliance</option>
                    <option value="qms">QMS</option>
                    <option value="knowledge">Knowledge</option>
                    <option value="sop">SOP</option>
                    <option value="communication">Communication</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Severity</span>
                <select id="filterSeverity" onchange="ntLoadList()">
                    <option value="">All</option>
                    <option value="info">Info</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">&nbsp;</span>
                <div style="display:flex;gap:6px;">
                    <button class="btn-filter" onclick="ntLoadList()">Search</button>
                    <button class="btn-filter-clear" onclick="ntClearFilters()">Clear</button>
                </div>
            </div>
        </div>

        <div class="bulk-bar" id="bulkBar">
            <span id="bulkCount">0 selected</span>
            <button class="btn-action btn-secondary" onclick="ntBulk('read')">Mark Read</button>
            <button class="btn-action btn-secondary" onclick="ntBulk('archive')">Archive</button>
            <button class="btn-action btn-success" onclick="ntBulk('complete')">Complete</button>
            <button class="btn-action btn-secondary" onclick="ntClearSelection()">Clear Selection</button>
        </div>

        <div class="inbox-list" id="inboxList"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- ── Notification Detail Modal ─────────────────────────────────────── -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box modal-md">
            <div id="detailBody"></div>
            <div id="detailEvents" style="margin-top:16px;"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>

    <!-- ── Snooze Modal ──────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="snoozeModal">
        <div class="modal-box modal-sm">
            <div class="modal-title">Snooze Notification</div>
            <div class="form-group">
                <label>Snooze Until *</label>
                <input type="datetime-local" id="snoozeUntil" />
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="ntCloseSnooze()">Cancel</button>
                <button class="btn-action btn-warning" onclick="ntSubmitSnooze()">Snooze</button>
            </div>
        </div>
    </div>

    <!-- ── Create Notification Modal ─────────────────────────────────────── -->
    <div class="modal-overlay" id="createModal">
        <div class="modal-box modal-md">
            <div class="modal-title">New Notification</div>
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="cfTitle" placeholder="e.g. Risk review overdue" />
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="cfMessage" placeholder="Optional details"></textarea>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="cfCategory">
                    <option value="risk">Risk</option>
                    <option value="tax">Tax</option>
                    <option value="billing">Billing</option>
                    <option value="workflow">Workflow</option>
                    <option value="capacity">Capacity</option>
                    <option value="client">Client</option>
                    <option value="documents">Documents</option>
                    <option value="compliance">Compliance</option>
                    <option value="qms">QMS</option>
                    <option value="knowledge">Knowledge</option>
                    <option value="sop">SOP</option>
                    <option value="communication">Communication</option>
                    <option value="system" selected>System</option>
                </select>
            </div>
            <div class="form-group">
                <label>Severity *</label>
                <select id="cfSeverity">
                    <option value="info">Info</option>
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label>Assign To (Team Member ID — optional; falls back to Practice Admin if blank)</label>
                <input type="text" id="cfAssignedId" placeholder="Optional numeric team member id" />
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="text" id="cfDueDate" placeholder="YYYY-MM-DD (optional)" />
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="ntCloseCreate()">Cancel</button>
                <button class="btn-action btn-primary" onclick="ntSubmitCreate()">Create</button>
            </div>
        </div>
    </div>

    <script src="/practice/js/polyfills.js"></script>
    <script src="/practice/js/auth.js"></script>
    <script src="/practice/js/api.js"></script>
    <script src="/practice/js/layout.js"></script>
    <script src="/practice/js/notifications.js"></script>
    <script>LAYOUT.init('notifications');</script>
</body>
</html>
