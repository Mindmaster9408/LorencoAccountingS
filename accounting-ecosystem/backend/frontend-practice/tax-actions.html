<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenco Practice — Tax Actions</title>
    <link rel="stylesheet" href="/practice/css/practice.css">
    <style>
        /* ── Filter bar ── */
        .ta-filter-bar { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; margin-bottom:0.9rem; }
        .ta-filter-bar select, .ta-filter-bar input { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.85); border-radius:5px; padding:0.35rem 0.55rem; font-size:0.8rem; }
        .ta-filter-bar select:focus, .ta-filter-bar input:focus { outline:none; border-color:rgba(255,255,255,0.25); }
        /* ── Action list ── */
        .ta-row { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:7px; padding:0.7rem 0.9rem; margin-bottom:0.45rem; display:flex; align-items:flex-start; gap:0.8rem; }
        .ta-row:hover { border-color:rgba(255,255,255,0.1); }
        .ta-row-body { flex:1; min-width:0; }
        .ta-row-title { font-size:0.85rem; font-weight:600; color:rgba(255,255,255,0.88); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .ta-row-meta  { font-size:0.73rem; color:rgba(255,255,255,0.4); display:flex; gap:0.5rem; flex-wrap:wrap; }
        .ta-row-btns  { display:flex; gap:0.35rem; flex-wrap:wrap; flex-shrink:0; align-items:center; }
        /* ── Badges ── */
        .ta-badge { display:inline-block; padding:2px 7px; border-radius:20px; font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.03em; }
        .ta-b-open        { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }
        .ta-b-in_progress { background:rgba(99,102,241,0.18);  color:#a5b4fc; }
        .ta-b-completed   { background:rgba(16,185,129,0.2);   color:#34d399; }
        .ta-b-dismissed   { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); }
        .ta-b-cancelled   { background:rgba(239,68,68,0.1);    color:#fca5a5; }
        .ta-b-src-individual_return, .ta-b-src-individual_calculation, .ta-b-src-individual_review_pack { background:rgba(99,102,241,0.15); color:#a5b4fc; }
        .ta-b-src-company_return,    .ta-b-src-company_calculation,    .ta-b-src-company_review_pack    { background:rgba(59,130,246,0.15);  color:#93c5fd; }
        .ta-b-src-provisional_plan   { background:rgba(139,92,246,0.15); color:#c4b5fd; }
        .ta-b-src-compliance_deadline{ background:rgba(239,68,68,0.15);  color:#fca5a5; }
        .ta-b-src-tax_dashboard_risk { background:rgba(245,158,11,0.15); color:#fcd34d; }
        .ta-b-src-document_request   { background:rgba(16,185,129,0.15); color:#6ee7b7; }
        /* ── Action buttons ── */
        .ta-btn { background:none; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.55); border-radius:4px; padding:3px 9px; font-size:0.73rem; cursor:pointer; transition:background 0.15s; }
        .ta-btn:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.85); }
        .ta-btn.complete { border-color:rgba(16,185,129,0.35); color:#6ee7b7; }
        .ta-btn.complete:hover { background:rgba(16,185,129,0.12); }
        .ta-btn.dismiss  { border-color:rgba(255,255,255,0.08); color:rgba(255,255,255,0.35); }
        /* ── Overdue ── */
        .ta-overdue { color:#f87171; font-weight:600; }
        /* ── Pagination ── */
        .ta-pagination { display:flex; align-items:center; gap:0.5rem; margin-top:0.8rem; font-size:0.8rem; color:rgba(255,255,255,0.5); }
        /* ── States ── */
        .ta-loading { color:rgba(255,255,255,0.35); font-size:0.82rem; padding:0.6rem 0; }
        .ta-empty   { color:rgba(255,255,255,0.3);  font-size:0.82rem; padding:0.6rem 0; }
        .ta-error   { color:#f87171; font-size:0.8rem; padding:0.4rem 0; }
        /* ── Confirm overlay (complete/dismiss inline) ── */
        .ta-confirm { display:flex; align-items:center; gap:0.5rem; margin-top:0.4rem; font-size:0.78rem; color:rgba(255,255,255,0.55); }
        .ta-confirm input[type="text"] { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.88); border-radius:4px; padding:0.28rem 0.5rem; font-size:0.78rem; flex:1; }
    </style>
</head>
<body>

<div class="topbar" id="app-topbar"></div>
<nav class="nav-tabs" id="app-nav"></nav>

<div class="main">

    <div class="section-header">
        <div>
            <div class="section-title">Tax Actions</div>
            <div class="col-muted" style="font-size:0.82rem;margin-top:2px;">
                Follow-up action tracking for tax work — created from the Tax Dashboard risk panels.
            </div>
        </div>
        <div class="controls">
            <button type="button" class="btn btn-secondary" onclick="taRefresh()">Refresh</button>
        </div>
    </div>

    <!-- ── Filters ── -->
    <div class="ta-filter-bar">
        <select id="taFltStatus" title="Filter by status" onchange="taApplyFilters()">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="dismissed">Dismissed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <select id="taFltSourceType" title="Filter by source type" onchange="taApplyFilters()">
            <option value="">All source types</option>
            <option value="individual_return">Individual Return</option>
            <option value="company_return">Company Return</option>
            <option value="provisional_plan">Provisional Plan</option>
            <option value="individual_calculation">Ind. Calculation</option>
            <option value="company_calculation">Co. Calculation</option>
            <option value="individual_review_pack">Ind. Review Pack</option>
            <option value="company_review_pack">Co. Review Pack</option>
            <option value="compliance_deadline">Compliance Deadline</option>
            <option value="tax_dashboard_risk">Dashboard Risk</option>
        </select>
        <select id="taFltAssignee" title="Filter by assignee">
            <option value="">All assignees</option>
        </select>
        <input id="taFltDueFrom" type="date" title="Due from" onchange="taApplyFilters()">
        <input id="taFltDueTo"   type="date" title="Due to"   onchange="taApplyFilters()">
        <button type="button" class="btn btn-secondary" onclick="taApplyFilters()">Apply</button>
    </div>

    <!-- ── Actions List ── -->
    <div class="panel">
        <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;">
            <span class="panel-title">Actions</span>
            <span id="taTotalLabel" style="font-size:0.78rem;color:rgba(255,255,255,0.4);"></span>
        </div>
        <div id="taList"></div>

        <div class="ta-pagination" id="taPagination" style="display:none;">
            <button type="button" class="btn btn-secondary" id="taBtnPrev" onclick="taPrevPage()">← Prev</button>
            <span id="taPageInfo"></span>
            <button type="button" class="btn btn-secondary" id="taBtnNext" onclick="taNextPage()">Next →</button>
        </div>
    </div>

</div><!-- /main -->

<script src="/practice/js/polyfills.js"></script>
<script src="/practice/js/auth.js"></script>
<script src="/practice/js/api.js"></script>
<script src="/practice/js/layout.js"></script>
<script src="/practice/js/tax-actions.js"></script>
</body>
</html>
