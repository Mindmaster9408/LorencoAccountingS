<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quality Management — Lorenco Practice</title>
    <link rel="stylesheet" href="/practice/css/layout.css" />
    <style>
        /* ── Base ──────────────────────────────────────────────────────── */
        body { background: #1a1a2e; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .page-content { padding: 24px; max-width: 1400px; margin: 0 auto; }

        /* ── Summary cards ─────────────────────────────────────────────── */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .summary-card { background: #1e2035; border-radius: 10px; padding: 14px 16px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
        .summary-card:hover { border-color: #667eea; }
        .sc-count { font-size: 1.6rem; font-weight: 800; color: #e2e8f0; }
        .sc-label { font-size: .72rem; color: #718096; margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }
        .sc-draft      { border-left: 3px solid #a0aec0; }
        .sc-in_review  { border-left: 3px solid #667eea; }
        .sc-passed     { border-left: 3px solid #68d391; }
        .sc-failed     { border-left: 3px solid #fc8181; }
        .sc-correction { border-left: 3px solid #f6ad55; }
        .sc-completed  { border-left: 3px solid #48bb78; }
        .sc-findings   { border-left: 3px solid #b794f4; }
        .sc-critical   { border-left: 3px solid #e53e3e; }

        /* ── Filters ───────────────────────────────────────────────────── */
        .filter-bar { background: #1e2035; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .filter-bar input, .filter-bar select { background: #12122a; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; padding: 7px 10px; font-size: .82rem; }
        .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: #667eea; }
        .filter-group { display: flex; flex-direction: column; gap: 3px; }
        .filter-label { font-size: .7rem; color: #718096; text-transform: uppercase; letter-spacing: .04em; }
        .btn-filter { background: #667eea; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-filter:hover { background: #5a67d8; }
        .btn-filter-clear { background: #2d3748; color: #a0aec0; border: none; border-radius: 6px; padding: 8px 14px; font-size: .82rem; cursor: pointer; }
        .btn-filter-clear:hover { background: #3a4555; }
        .btn-add { background: #48bb78; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: .85rem; font-weight: 700; cursor: pointer; }
        .btn-add:hover { background: #38a169; }

        /* ── Table ─────────────────────────────────────────────────────── */
        .table-wrap { background: #1e2035; border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #12122a; color: #a0aec0; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; padding: 10px 14px; text-align: left; }
        td { padding: 10px 14px; font-size: .82rem; border-bottom: 1px solid #12122a; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #252840; cursor: pointer; }
        .empty-row td { text-align: center; color: #4a5568; padding: 32px; }
        .td-title { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ── Status pills ──────────────────────────────────────────────── */
        .pill { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
        .st-draft            { background: rgba(160,174,192,.15); color: #a0aec0; }
        .st-in_review        { background: rgba(102,126,234,.2);  color: #818cf8; }
        .st-passed           { background: rgba(104,211,145,.2);  color: #68d391; }
        .st-failed           { background: rgba(252,129,74,.2);   color: #fc8181; }
        .st-needs_correction { background: rgba(246,173,85,.2);   color: #f6ad55; }
        .st-completed        { background: rgba(104,211,145,.15); color: #68d391; }
        .st-cancelled        { background: rgba(74,85,104,.3);    color: #718096; }
        .st-open             { background: rgba(246,173,85,.15);  color: #f6ad55; }
        .st-in_progress      { background: rgba(102,126,234,.2);  color: #818cf8; }
        .st-resolved         { background: rgba(104,211,145,.2);  color: #68d391; }
        .st-verified         { background: rgba(104,211,145,.3);  color: #48bb78; }
        .st-dismissed        { background: rgba(74,85,104,.3);    color: #718096; }

        /* ── Type / severity badges ────────────────────────────────────── */
        .type-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: .7rem; font-weight: 700; background: rgba(102,126,234,.2); color: #667eea; }
        .sev-badge  { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: .7rem; font-weight: 700; }
        .sev-low      { background: rgba(160,174,192,.2); color: #a0aec0; }
        .sev-medium   { background: rgba(246,173,85,.2);  color: #f6ad55; }
        .sev-high     { background: rgba(252,129,74,.2);  color: #fc8181; }
        .sev-critical { background: rgba(229,62,62,.25);  color: #feb2b2; }

        /* ── Modals ────────────────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #1e2035; border-radius: 14px; padding: 28px; width: 90%; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .modal-sm  { max-width: 480px; }
        .modal-md  { max-width: 640px; }
        .modal-lg  { max-width: 920px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #e2e8f0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: .78rem; color: #a0aec0; }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            background: #12122a; border: 1px solid #2d3748; border-radius: 7px;
            color: #e2e8f0; padding: 8px 11px; font-size: .85rem; width: 100%; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 70px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

        /* ── Buttons ───────────────────────────────────────────────────── */
        .btn-action { padding: 8px 16px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 700; cursor: pointer; }
        .btn-action:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary   { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #2d3748; color: #e2e8f0; }
        .btn-secondary:hover { background: #3a4555; }
        .btn-success   { background: #48bb78; color: #fff; }
        .btn-success:hover { background: #38a169; }
        .btn-warning   { background: #ed8936; color: #fff; }
        .btn-warning:hover { background: #dd6b20; }
        .btn-danger    { background: #e53e3e; color: #fff; }
        .btn-danger:hover { background: #c53030; }
        .btn-sm        { padding: 5px 11px; font-size: .78rem; }

        /* ── Detail modal tabs ──────────────────────────────────────────── */
        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: #12122a; border: none; color: #718096; padding: 7px 16px; border-radius: 7px; font-size: .82rem; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #667eea; color: #fff; }
        .tab-content { padding: 4px 0; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .detail-row  { display: flex; flex-direction: column; padding: 8px 12px; border-bottom: 1px solid #12122a; }
        .detail-label { font-size: .72rem; color: #718096; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
        .detail-value { font-size: .85rem; color: #e2e8f0; }
        .section-label { font-size: .72rem; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin: 14px 0 6px; }

        /* ── Findings / events items ───────────────────────────────────── */
        .finding-item, .event-item { background: #12122a; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
        .finding-item-header, .event-header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
        .finding-title, .event-type { font-weight: 700; color: #e2e8f0; font-size: .85rem; }
        .finding-meta, .event-notes { font-size: .78rem; color: #718096; margin-top: 3px; }
        .event-time { font-size: .72rem; color: #4a5568; margin-left: auto; }
        .event-status-change { display: flex; gap: 6px; align-items: center; font-size: .75rem; margin-bottom: 3px; }
        .event-arrow { color: #4a5568; }
        .capa-block { background: #1a1a2e; border-radius: 6px; padding: 8px 10px; margin-top: 6px; font-size: .78rem; color: #a0aec0; }
        .capa-label { color: #718096; font-weight: 700; text-transform: uppercase; font-size: .68rem; letter-spacing: .04em; }

        /* ── Inline messages ────────────────────────────────────────────── */
        .inline-msg { padding: 10px 14px; border-radius: 8px; font-size: .82rem; margin-bottom: 10px; }
        .inline-msg.info { background: rgba(102,126,234,.1); color: #a3bffa; border: 1px solid rgba(102,126,234,.2); }
        .loading-state { text-align: center; color: #4a5568; padding: 20px; font-size: .85rem; }
    </style>
</head>
<body>
    <div id="app-topbar"></div>
    <nav id="app-nav"></nav>

    <div class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h1 style="font-size:1.3rem;font-weight:700;margin:0;">Quality Management System</h1>
            <button class="btn-add" onclick="qmsOpenCreate()">+ New Review</button>
        </div>

        <div class="inline-msg info">
            Practice quality control — reviews, non-conformance findings, and CAPA. Not AI. Not a disciplinary workflow.
        </div>

        <!-- Summary cards -->
        <div class="summary-grid" id="summaryGrid"></div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">Review Type</span>
                <select id="filterReviewType" onchange="qmsLoad()">
                    <option value="">All Types</option>
                    <option value="task_review">Task Review</option>
                    <option value="workflow_review">Workflow Review</option>
                    <option value="tax_review">Tax Review</option>
                    <option value="completion_pack_review">Completion Pack Review</option>
                    <option value="sop_compliance_review">SOP Compliance Review</option>
                    <option value="internal_inspection">Internal Inspection</option>
                    <option value="client_file_review">Client File Review</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <select id="filterStatus" onchange="qmsLoad()">
                    <option value="">All Statuses</option>
                    <option value="draft">Draft</option>
                    <option value="in_review">In Review</option>
                    <option value="passed">Passed</option>
                    <option value="failed">Failed</option>
                    <option value="needs_correction">Needs Correction</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Client ID</span>
                <input type="text" id="filterClientId" placeholder="Client ID" style="width:90px" onchange="qmsLoad()" />
            </div>
            <div class="filter-group">
                <span class="filter-label">Search</span>
                <input type="text" id="filterSearch" placeholder="Title / notes" style="width:200px" />
            </div>
            <div class="filter-group">
                <span class="filter-label">&nbsp;</span>
                <div style="display:flex;gap:6px;">
                    <button class="btn-filter" onclick="qmsLoad()">Search</button>
                    <button class="btn-filter-clear" onclick="qmsClearFilters()">Clear</button>
                </div>
            </div>
        </div>

        <!-- Reviews table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Title</th>
                        <th>Client</th>
                        <th>Score</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="7">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination" style="text-align:center;margin-top:14px;font-size:.82rem;color:#718096;"></div>
    </div>

    <!-- ── Create Review Modal ────────────────────────────────────────────── -->
    <div class="modal-overlay" id="createModal">
        <div class="modal-box modal-md">
            <div class="modal-title">New Quality Review</div>
            <div class="form-row">
                <div class="form-group full">
                    <label>Review Title *</label>
                    <input type="text" id="createTitle" placeholder="e.g. Q3 File Review — ABC (Pty) Ltd" />
                </div>
                <div class="form-group">
                    <label>Review Type *</label>
                    <select id="createReviewType">
                        <option value="">Select…</option>
                        <option value="task_review">Task Review</option>
                        <option value="workflow_review">Workflow Review</option>
                        <option value="tax_review">Tax Review</option>
                        <option value="completion_pack_review">Completion Pack Review</option>
                        <option value="sop_compliance_review">SOP Compliance Review</option>
                        <option value="internal_inspection">Internal Inspection</option>
                        <option value="client_file_review">Client File Review</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Client ID</label>
                    <input type="text" id="createClientId" placeholder="Practice client ID" />
                </div>
                <div class="form-group">
                    <label>Assigned Reviewer (Team Member ID)</label>
                    <input type="text" id="createReviewer" placeholder="Team member ID" />
                </div>
                <div class="form-group full">
                    <label>Notes</label>
                    <textarea id="createNotes" placeholder="Optional notes"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="qmsCloseCreate()">Cancel</button>
                <button class="btn-action btn-primary" onclick="qmsSubmitCreate()">Create Review</button>
            </div>
        </div>
    </div>

    <!-- ── Detail Modal ───────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box modal-lg">
            <div id="detailTabBar" class="tab-bar"></div>
            <div id="detailBody" style="min-height:200px;"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>

    <!-- ── Add Finding Modal ──────────────────────────────────────────────── -->
    <div class="modal-overlay" id="findingModal">
        <div class="modal-box modal-md">
            <div class="modal-title">Add Finding</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Finding Type *</label>
                    <select id="findType">
                        <option value="non_conformance">Non-Conformance</option>
                        <option value="observation">Observation</option>
                        <option value="improvement">Improvement</option>
                        <option value="risk">Risk</option>
                        <option value="missing_evidence">Missing Evidence</option>
                        <option value="sop_not_followed">SOP Not Followed</option>
                        <option value="review_note">Review Note</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Severity *</label>
                    <select id="findSeverity">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Finding Title *</label>
                    <input type="text" id="findTitle" placeholder="e.g. Missing engagement letter on file" />
                </div>
                <div class="form-group full">
                    <label>Description</label>
                    <textarea id="findDescription" placeholder="What was found"></textarea>
                </div>
                <div class="form-group full">
                    <label>Root Cause</label>
                    <textarea id="findRootCause" placeholder="Why it happened"></textarea>
                </div>
                <div class="form-group full">
                    <label>Corrective Action</label>
                    <textarea id="findCorrectiveAction" placeholder="What will fix it now"></textarea>
                </div>
                <div class="form-group full">
                    <label>Preventive Action</label>
                    <textarea id="findPreventiveAction" placeholder="What will stop it recurring"></textarea>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="findDueDate" />
                </div>
                <div class="form-group">
                    <label>Responsible (Team Member ID)</label>
                    <input type="text" id="findResponsible" placeholder="Team member ID" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="qmsCloseFinding()">Cancel</button>
                <button class="btn-action btn-primary" onclick="qmsSubmitFinding()">Add Finding</button>
            </div>
        </div>
    </div>

    <!-- ── Action Modal (pass/fail/complete with score) ───────────────────── -->
    <div class="modal-overlay" id="actionModal">
        <div class="modal-box modal-sm">
            <div class="modal-title" id="actionTitle"></div>
            <div class="form-group">
                <label>Quality Score (0–100)</label>
                <input type="number" id="actionScore" min="0" max="100" placeholder="Optional" />
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="actionNotes" placeholder="Optional notes"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-secondary" onclick="qmsCloseAction()">Cancel</button>
                <button class="btn-action btn-primary" id="actionSubmitBtn" onclick="qmsSubmitAction()">Submit</button>
            </div>
        </div>
    </div>

    <script src="/practice/js/polyfills.js"></script>
    <script src="/practice/js/auth.js"></script>
    <script src="/practice/js/api.js"></script>
    <script src="/practice/js/layout.js"></script>
    <script src="/practice/js/quality-management.js"></script>
    <script>LAYOUT.init('quality');</script>
</body>
</html>
