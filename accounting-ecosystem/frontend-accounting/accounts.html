<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart of Accounts - Lorenco Accounting</title>
    <script src="js/navigation.js"></script>
    <script src="js/polyfills.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; }
        .main-content { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .page-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { font-size: 24px; color: #202124; }
        .page-header p { color: #5f6368; margin-top: 4px; }
        .btn-primary { padding: 10px 20px; background: linear-gradient(135deg, #0066cc, #0099ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; box-shadow: 0 2px 8px rgba(0,102,204,0.3); transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { padding: 10px 20px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; }
        .section { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e8eaed; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 14px 16px; text-align: left; font-weight: 600; color: #5f6368; font-size: 13px; border-bottom: 2px solid #e8eaed; }
        td { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; font-size: 13px; color: #202124; }
        tr:hover { background: #f0f8ff; }
        .type-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .type-asset     { background: #e3f2fd; color: #1565c0; }
        .type-liability { background: #fce4ec; color: #c62828; }
        .type-equity    { background: #e8f5e9; color: #2e7d32; }
        .type-income    { background: #f3e5f5; color: #6a1b9a; }
        .type-expense   { background: #fff3e0; color: #e65100; }
        .system-badge   { background: #e0e0e0; color: #616161; font-size: 10px; padding: 2px 8px; border-radius: 8px; margin-left: 6px; }
        .inactive-badge { background: #f5f5f5; color: #9aa0a6; font-size: 10px; padding: 2px 8px; border-radius: 8px; margin-left: 6px; }
        .action-btn { padding: 4px 10px; border: 1px solid #e0e0e0; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 600; background: white; }
        .action-btn:hover { background: #f0f8ff; border-color: #0066cc; color: #0066cc; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 30px; width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal h2 { margin-bottom: 20px; font-size: 18px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group input:read-only { background: #f8f9fa; color: #5f6368; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-error { background: #fce4ec; color: #c62828; padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 13px; display: none; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-item { background: white; padding: 16px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); text-align: center; }
        .stat-item .count { font-size: 26px; font-weight: 700; color: #0066cc; }
        .stat-item .label { font-size: 12px; color: #5f6368; margin-top: 4px; }
        .error-banner { background: #fce4ec; color: #c62828; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 600; display: none; }
        .loading-row td { text-align: center; padding: 40px; color: #9aa0a6; }
        .empty-state { text-align: center; padding: 60px 30px; }
        .empty-state h3 { font-size: 18px; color: #202124; margin-bottom: 8px; }
        .empty-state p { color: #5f6368; font-size: 13px; margin-bottom: 24px; }
        .btn-provision { padding: 12px 28px; background: linear-gradient(135deg, #0066cc, #0099ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; box-shadow: 0 2px 8px rgba(0,102,204,0.3); transition: all 0.2s; }
        .btn-provision:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,102,204,0.4); }
        .btn-provision:disabled { opacity: 0.6; cursor: not-allowed; }
        .provision-note { font-size: 12px; color: #9aa0a6; margin-top: 10px; }
    </style>
    <link rel="stylesheet" href="css/dark-theme.css">
</head>
<body>

<div class="main-content">
    <div class="page-header">
        <div>
            <h1>Chart of Accounts</h1>
            <p>Manage your general ledger accounts</p>
        </div>
        <button class="btn-primary" onclick="showCreateModal()">+ New Account</button>
    </div>

    <div class="stats" id="accountStats"></div>

    <div id="errorBanner" class="error-banner"></div>

    <div class="filter-bar">
        <select id="filterType" onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="asset">Assets</option>
            <option value="liability">Liabilities</option>
            <option value="equity">Equity</option>
            <option value="income">Income</option>
            <option value="expense">Expenses</option>
        </select>
        <select id="filterActive" onchange="loadAccounts()">
            <option value="active">Active Only</option>
            <option value="all">All (inc. inactive)</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search code or name…" oninput="applyFilters()">
    </div>

    <div class="section">
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Account Name</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="accountsBody">
                <tr class="loading-row"><td colspan="5">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="accountModal">
    <div class="modal">
        <h2 id="modalTitle">New Account</h2>

        <div class="form-group">
            <label>Account Code *</label>
            <input type="text" id="accCode" placeholder="e.g. 6100">
        </div>
        <div class="form-group">
            <label>Account Name *</label>
            <input type="text" id="accName" placeholder="e.g. Travel Expenses">
        </div>
        <div class="form-group">
            <label>Type *</label>
            <select id="accType">
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="equity">Equity</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="accDesc" rows="2" placeholder="Optional description"></textarea>
        </div>
        <div class="form-group" id="isActiveGroup" style="display:none">
            <label>Status</label>
            <select id="accActive">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>

        <div class="modal-error" id="modalError"></div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="saveAccountBtn" onclick="saveAccount()">Save Account</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    function authH() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    function showError(msg) { const el = document.getElementById('errorBanner'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 8000); }

    let allAccounts = [];
    let editingId   = null;

    // ── Load ─────────────────────────────────────────────────────────────────
    async function loadAccounts() {
        const showAll = document.getElementById('filterActive').value === 'all';
        const params  = showAll ? '?includeInactive=true' : '';

        document.getElementById('accountsBody').innerHTML = '<tr class="loading-row"><td colspan="5">Loading…</td></tr>';

        try {
            const res  = await fetch('/api/accounts' + params, { headers: authH() });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            allAccounts = data.accounts || [];

            if (allAccounts.length === 0 && !showAll) {
                renderEmptyState();
            } else {
                applyFilters();
            }
        } catch (err) {
            document.getElementById('accountsBody').innerHTML =
                `<tr class="loading-row"><td colspan="5" style="color:#d32f2f">Failed to load accounts: ${err.message}</td></tr>`;
        }
    }

    // ── Filter + Render ───────────────────────────────────────────────────────
    function applyFilters() {
        const type   = document.getElementById('filterType').value;
        const search = document.getElementById('searchInput').value.toLowerCase();

        let filtered = allAccounts;
        if (type)   filtered = filtered.filter(a => a.type === type);
        if (search) filtered = filtered.filter(a =>
            a.code.toLowerCase().includes(search) || a.name.toLowerCase().includes(search)
        );

        renderAccounts(filtered);
    }

    const TYPE_LABELS = { asset: 'Asset', liability: 'Liability', equity: 'Equity', income: 'Income', expense: 'Expense' };

    function renderAccounts(list) {
        // Stats
        const types = ['asset', 'liability', 'equity', 'income', 'expense'];
        document.getElementById('accountStats').innerHTML = types.map(t => {
            const count = allAccounts.filter(a => a.type === t).length;
            return `<div class="stat-item"><div class="count">${count}</div><div class="label">${TYPE_LABELS[t]} Accounts</div></div>`;
        }).join('');

        const tbody = document.getElementById('accountsBody');
        if (!list.length) {
            tbody.innerHTML = '<tr class="loading-row"><td colspan="5">No accounts found.</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(acc => {
            const nameBadges =
                (acc.is_system  ? '<span class="system-badge">SYSTEM</span>' : '') +
                (!acc.is_active ? '<span class="inactive-badge">INACTIVE</span>' : '');

            const editBtn = !acc.is_system
                ? `<button class="action-btn" onclick="showEditModal(${acc.id})">Edit</button>`
                : '';

            return `<tr>
                <td><strong>${esc(acc.code)}</strong></td>
                <td>${esc(acc.name)}${nameBadges}</td>
                <td><span class="type-badge type-${acc.type}">${acc.type}</span></td>
                <td style="color:#5f6368">${esc(acc.description || '')}</td>
                <td>${editBtn}</td>
            </tr>`;
        }).join('');
    }

    // ── Create Modal ──────────────────────────────────────────────────────────
    function showCreateModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent    = 'New Account';
        document.getElementById('accCode').value             = '';
        document.getElementById('accCode').readOnly          = false;
        document.getElementById('accName').value             = '';
        document.getElementById('accType').value             = 'expense';
        document.getElementById('accType').disabled          = false;
        document.getElementById('accDesc').value             = '';
        document.getElementById('isActiveGroup').style.display = 'none';
        document.getElementById('modalError').style.display  = 'none';
        document.getElementById('saveAccountBtn').textContent = 'Save Account';
        document.getElementById('accountModal').classList.add('show');
    }

    // ── Edit Modal ────────────────────────────────────────────────────────────
    function showEditModal(id) {
        const acc = allAccounts.find(a => a.id === id);
        if (!acc) return;

        editingId = id;
        document.getElementById('modalTitle').textContent   = 'Edit Account';
        document.getElementById('accCode').value            = acc.code;
        document.getElementById('accCode').readOnly         = true;
        document.getElementById('accName').value            = acc.name;
        document.getElementById('accType').value            = acc.type;
        document.getElementById('accType').disabled         = true;
        document.getElementById('accDesc').value            = acc.description || '';
        document.getElementById('accActive').value          = acc.is_active ? 'true' : 'false';
        document.getElementById('isActiveGroup').style.display = 'block';
        document.getElementById('modalError').style.display = 'none';
        document.getElementById('saveAccountBtn').textContent = 'Update Account';
        document.getElementById('accountModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('accountModal').classList.remove('show');
        document.getElementById('accType').disabled = false;
        editingId = null;
    }

    // ── Save ──────────────────────────────────────────────────────────────────
    async function saveAccount() {
        const name = document.getElementById('accName').value.trim();
        const desc = document.getElementById('accDesc').value.trim();
        const errEl = document.getElementById('modalError');
        errEl.style.display = 'none';

        const btn = document.getElementById('saveAccountBtn');
        btn.disabled = true;

        try {
            let res, data;

            if (editingId) {
                // Edit: only name, description, isActive can change
                const isActive = document.getElementById('accActive').value === 'true';
                if (!name) { errEl.textContent = 'Account name is required.'; errEl.style.display = 'block'; return; }
                res  = await fetch(`/api/accounts/${editingId}`, {
                    method: 'PUT',
                    headers: authH(),
                    body: JSON.stringify({ name, description: desc || null, isActive })
                });
                data = await res.json();
            } else {
                // Create
                const code = document.getElementById('accCode').value.trim();
                const type = document.getElementById('accType').value;
                if (!code || !name) { errEl.textContent = 'Code and name are required.'; errEl.style.display = 'block'; return; }
                res  = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: authH(),
                    body: JSON.stringify({ code, name, type, description: desc || null })
                });
                data = await res.json();
            }

            if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);

            closeModal();
            await loadAccounts();

        } catch (err) {
            errEl.textContent = err.message;
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }

    // ── Empty State / Provision ───────────────────────────────────────────────
    function renderEmptyState() {
        document.getElementById('accountStats').innerHTML = '';
        document.getElementById('accountsBody').innerHTML = `
            <tr><td colspan="5">
                <div class="empty-state">
                    <h3>No chart of accounts set up yet</h3>
                    <p>This company has no ledger accounts. Set up a standard South African chart of accounts<br>to get started — you can customise it afterwards.</p>
                    <button class="btn-provision" id="provisionBtn" onclick="provisionDefaults()">
                        Set up Default SA Chart of Accounts
                    </button>
                    <div class="provision-note">Seeds 32 standard accounts (assets, liabilities, equity, income &amp; expenses)</div>
                </div>
            </td></tr>`;
    }

    async function provisionDefaults() {
        const btn = document.getElementById('provisionBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Setting up…'; }

        try {
            const res  = await fetch('/api/accounts/provision-defaults', { method: 'POST', headers: authH() });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
            await loadAccounts();
        } catch (err) {
            showError('Failed to provision default accounts: ' + err.message);
            if (btn) { btn.disabled = false; btn.textContent = 'Set up Default SA Chart of Accounts'; }
        }
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('accountModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadAccounts();
</script>
</body>
</html>
