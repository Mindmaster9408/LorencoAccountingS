<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenco Accounting — Forensic Audit Trail</title>
  <script src="js/navigation.js"></script>
  <script src="js/theme-guard.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .page-wrapper { max-width: 1500px; margin: 24px auto; padding: 0 24px; }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .page-header h1 { font-size: 24px; font-weight: 700; color: #fff; }
    .page-header p  { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }

    .page-header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #6ee7b7;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: #34d058;
      border-radius: 50%;
    }

    /* ── Filter card ──────────────────────────────────────────────────────── */
    .filter-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 18px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 160px 160px 180px 160px 160px 1fr;
      gap: 12px;
      align-items: end;
    }

    .filter-row-2 {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
      margin-top: 12px;
    }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }

    .filter-group label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group input,
    .filter-group select {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 13px;
      background: #1e1b3a;
      color: #fff;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .filter-group input::placeholder { color: rgba(255,255,255,0.35); }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.3);
    }

    .filter-group select option { background: #1e1b3a; color: #fff; }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn-primary {
      padding: 9px 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.15s;
      white-space: nowrap;
    }

    .btn-primary:hover { box-shadow: 0 4px 15px rgba(245,158,11,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 9px 18px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    /* ── Results card ─────────────────────────────────────────────────────── */
    .results-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .results-header h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .results-meta { font-size: 13px; color: rgba(255,255,255,0.5); }

    /* ── Table ────────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead tr { background: rgba(255,255,255,0.06); }

    th {
      padding: 9px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.05); }

    /* ── Severity badges ──────────────────────────────────────────────────── */
    .sev-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .sev-info     { background: rgba(59,130,246,0.2);  color: #93c5fd; }
    .sev-warning  { background: rgba(245,158,11,0.2);  color: #fbbf24; }
    .sev-high     { background: rgba(249,115,22,0.2);  color: #fb923c; }
    .sev-critical { background: rgba(239,68,68,0.2);   color: #fca5a5; }

    /* left border on the row itself for critical/high visibility */
    tr.row-critical td:first-child { border-left: 3px solid #ef4444; }
    tr.row-high     td:first-child { border-left: 3px solid #f97316; }
    tr.row-warning  td:first-child { border-left: 3px solid #f59e0b; }

    /* ── Module badges ────────────────────────────────────────────────────── */
    .mod-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .mod-bank             { background: rgba(20,184,166,0.2);  color: #5eead4; }
    .mod-journals         { background: rgba(139,92,246,0.2);  color: #c4b5fd; }
    .mod-vat              { background: rgba(245,158,11,0.2);  color: #fbbf24; }
    .mod-ar               { background: rgba(59,130,246,0.2);  color: #93c5fd; }
    .mod-ap               { background: rgba(239,68,68,0.2);   color: #fca5a5; }
    .mod-accounts         { background: rgba(34,197,94,0.2);   color: #86efac; }
    .mod-historical       { background: rgba(99,102,241,0.2);  color: #a5b4fc; }
    .mod-opening_balances { background: rgba(6,182,212,0.2);   color: #67e8f9; }
    .mod-system           { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
    .mod-ai               { background: rgba(168,85,247,0.2);  color: #d8b4fe; }

    /* ── Event type ────────────────────────────────────────────────────────── */
    .event-type {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* ── Actor cell ───────────────────────────────────────────────────────── */
    .actor-system { color: rgba(255,255,255,0.35); font-style: italic; }
    .actor-ai     { color: #d8b4fe; font-weight: 600; }
    .actor-id     { font-family: 'Courier New', monospace; font-size: 11px; color: rgba(255,255,255,0.35); }

    /* ── Source badge ─────────────────────────────────────────────────────── */
    .source-badge {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
    }

    /* ── Timestamp ────────────────────────────────────────────────────────── */
    .ts { font-size: 12px; white-space: nowrap; color: rgba(255,255,255,0.85); }
    .ts-date { color: rgba(255,255,255,0.45); }

    /* ── Detail drawer ────────────────────────────────────────────────────── */
    .detail-btn {
      background: none;
      border: none;
      color: #fbbf24;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .detail-drawer {
      display: none;
      margin-top: 8px;
      background: #0f172a;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 320px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .detail-drawer.open { display: block; }

    .drawer-section { margin-bottom: 10px; }
    .drawer-key     { color: #7dd3fc; }
    .drawer-val     { color: #a7f3d0; }
    .drawer-null    { color: rgba(255,255,255,0.35); font-style: italic; }
    .drawer-label   { color: #f0abfc; font-weight: bold; margin-bottom: 4px; display: block; }

    /* ── Pagination ───────────────────────────────────────────────────────── */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .pagination-info { font-size: 13px; color: rgba(255,255,255,0.5); }

    .pagination-btns { display: flex; gap: 8px; align-items: center; }

    .page-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      color: rgba(255,255,255,0.8);
    }

    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info-num { font-size: 13px; color: rgba(255,255,255,0.7); padding: 0 6px; }

    /* ── State boxes ──────────────────────────────────────────────────────── */
    .state-box {
      padding: 48px 24px;
      text-align: center;
      color: rgba(255,255,255,0.4);
    }

    .state-box .icon { font-size: 36px; margin-bottom: 10px; }
    .state-box p     { font-size: 14px; }

    /* ── Error / info banners ─────────────────────────────────────────────── */
    .banner {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .banner-error { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .banner-info  { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }

    /* ── Desc cell ───────────────────────────────────────────────────────── */
    .desc-cell { max-width: 280px; }
    .desc-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .filter-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <h1>Forensic Audit Trail</h1>
      <p>Immutable investigation console — who did what, when, on which entity, from which module</p>
    </div>
    <div class="page-header-meta">
      <span class="live-badge"><span class="live-dot"></span>Read-Only</span>
    </div>
  </div>

  <div id="errorBanner" class="banner banner-error"></div>
  <div id="infoBanner"  class="banner banner-info"></div>

  <!-- Filters -->
  <div class="filter-card">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date</label>
        <input type="date" id="fromDate" title="From Date">
      </div>
      <div class="filter-group">
        <label>To Date</label>
        <input type="date" id="toDate" title="To Date">
      </div>
      <div class="filter-group">
        <label>Module</label>
        <select id="modFilter" title="Filter by module">
          <option value="">— All Modules —</option>
          <option value="bank">Bank</option>
          <option value="journals">Journals</option>
          <option value="vat">VAT</option>
          <option value="ar">AR (Accounts Receivable)</option>
          <option value="ap">AP (Accounts Payable)</option>
          <option value="accounts">Chart of Accounts</option>
          <option value="historical">Historical Comparatives</option>
          <option value="opening_balances">Opening Balances</option>
          <option value="system">System / Admin</option>
          <option value="ai">AI / Sean</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Severity</label>
        <select id="sevFilter" title="Filter by severity">
          <option value="">— All Severities —</option>
          <option value="info">Info</option>
          <option value="warning">Warning</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Event Type</label>
        <input type="text" id="eventTypeFilter" placeholder="e.g. BANK_RULE_ACCEPTED">
      </div>
      <div class="filter-group">
        <label>User ID</label>
        <input type="text" id="userIdFilter" placeholder="e.g. 42">
      </div>
    </div>
    <div class="filter-row-2">
      <div class="filter-group">
        <label>Search (description / event / entity)</label>
        <input type="text" id="searchFilter" placeholder="Free-text search…" onkeydown="if(event.key==='Enter')loadEvents(true)">
      </div>
      <button type="button" class="btn-primary" id="searchBtn" onclick="loadEvents(true)">Search</button>
      <button type="button" class="btn-secondary" onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results-card">
    <div class="results-header">
      <h2>Audit Events</h2>
      <span class="results-meta" id="resultsMeta">Loading…</span>
    </div>
    <div class="table-wrap">
      <table id="eventsTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Sev</th>
            <th>Module</th>
            <th>Event Type</th>
            <th>Entity</th>
            <th>Actor</th>
            <th>Description</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="eventsBody">
          <tr>
            <td colspan="8">
              <div class="state-box">
                <div class="icon">&#128269;</div>
                <p>Loading audit events&hellip;</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination" style="display:none;">
      <span class="pagination-info" id="paginationInfo">—</span>
      <div class="pagination-btns">
        <button type="button" class="page-btn" id="prevBtn" onclick="prevPage()" disabled>&#8592; Previous</button>
        <span class="page-info-num" id="pageNum">Page 1</span>
        <button type="button" class="page-btn" id="nextBtn" onclick="nextPage()">Next &#8594;</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Auth ───────────────────────────────────────────────────────────────────
  const token = localStorage.getItem('token')
             || localStorage.getItem('sb-token')
             || localStorage.getItem('eco_token');
  if (!token) { window.location.href = '/dashboard/login.html'; }

  function authHeaders() {
    return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  }

  // ── XSS safety ─────────────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escOrDash(str) {
    const s = esc(str);
    return s || '&mdash;';
  }

  // ── Pagination state ────────────────────────────────────────────────────────
  const PAGE_SIZE = 50;
  let currentPage = 0;
  let totalCount  = 0;

  // ── Format helpers ──────────────────────────────────────────────────────────
  function fmtTs(ts) {
    if (!ts) return '&mdash;';
    try {
      const d = new Date(ts);
      const date = d.toLocaleDateString('en-ZA', { year: 'numeric', month: '2-digit', day: '2-digit' });
      const time = d.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      return `<span class="ts">${esc(date)}<br><span class="ts-date">${esc(time)}</span></span>`;
    } catch (_) {
      return esc(ts);
    }
  }

  function sevBadge(sev) {
    const s = (sev || 'info').toLowerCase();
    const labels = { info: 'INFO', warning: 'WARN', high: 'HIGH', critical: 'CRIT' };
    return `<span class="sev-badge sev-${esc(s)}">${labels[s] || esc(s).toUpperCase()}</span>`;
  }

  function modBadge(mod) {
    const m = (mod || 'system').toLowerCase().replace(/[^a-z_]/g, '_');
    const labels = {
      bank: 'Bank', journals: 'Journals', vat: 'VAT',
      ar: 'AR', ap: 'AP', accounts: 'Accounts',
      historical: 'Historical', opening_balances: 'Opening Bal.',
      system: 'System', ai: 'AI / Sean',
    };
    return `<span class="mod-badge mod-${esc(m)}">${esc(labels[m] || mod)}</span>`;
  }

  function actorCell(ev) {
    if (ev.actorType === 'SYSTEM') return `<span class="actor-system">SYSTEM</span>`;
    if (ev.actorType === 'AI')     return `<span class="actor-ai">Sean AI</span>`;
    const name = esc(ev.userName);
    const id   = ev.userId ? `<br><span class="actor-id">#${esc(ev.userId)}</span>` : '';
    return name ? `${name}${id}` : `<span class="actor-id">${escOrDash(ev.userId)}</span>`;
  }

  function entityCell(ev) {
    const type = esc(ev.entityType || '');
    const id   = ev.entityId ? `<br><span class="actor-id">#${esc(ev.entityId)}</span>` : '';
    return type ? `${type}${id}` : '&mdash;';
  }

  // ── Detail drawer ───────────────────────────────────────────────────────────
  // Safe JSON rendering: escape all content, no innerHTML injection from data.

  function buildDrawerHtml(ev) {
    const sections = [];

    if (ev.description) {
      sections.push(
        `<div class="drawer-section"><span class="drawer-label">Description</span>` +
        `<span class="drawer-val">${esc(ev.description)}</span></div>`
      );
    }

    if (ev.metadata && Object.keys(ev.metadata).length > 0) {
      sections.push(
        `<div class="drawer-section"><span class="drawer-label">Metadata</span>` +
        renderJson(ev.metadata) + `</div>`
      );
    }

    if (ev.beforeData) {
      sections.push(
        `<div class="drawer-section"><span class="drawer-label">Before</span>` +
        renderJson(ev.beforeData) + `</div>`
      );
    }

    if (ev.afterData) {
      sections.push(
        `<div class="drawer-section"><span class="drawer-label">After</span>` +
        renderJson(ev.afterData) + `</div>`
      );
    }

    if (ev.ipAddress) {
      sections.push(
        `<div class="drawer-section"><span class="drawer-label">IP</span>` +
        `<span class="drawer-val">${esc(ev.ipAddress)}</span></div>`
      );
    }

    sections.push(
      `<div class="drawer-section"><span class="drawer-label">Source table</span>` +
      `<span class="source-badge">${esc(ev.source || '—')}</span></div>`
    );

    if (!sections.length) return '<span class="drawer-null">No detail available.</span>';
    return sections.join('');
  }

  function renderJson(obj) {
    // Safe JSON renderer — no eval, no innerHTML from raw user data.
    try {
      const raw = JSON.stringify(obj, null, 2);
      return `<span class="drawer-val">${esc(raw)}</span>`;
    } catch (_) {
      return '<span class="drawer-null">[unrenderable]</span>';
    }
  }

  let openDrawerId = null;

  function toggleDrawer(id) {
    // Close previous
    if (openDrawerId !== null && openDrawerId !== id) {
      const prev = document.getElementById('drawer-' + openDrawerId);
      const prevBtn = document.getElementById('drawer-btn-' + openDrawerId);
      if (prev) prev.classList.remove('open');
      if (prevBtn) prevBtn.textContent = 'Details';
    }
    const drawer = document.getElementById('drawer-' + id);
    const btn    = document.getElementById('drawer-btn-' + id);
    if (!drawer) return;
    const isOpen = drawer.classList.toggle('open');
    if (btn) btn.textContent = isOpen ? 'Close' : 'Details';
    openDrawerId = isOpen ? id : null;
  }

  // ── Render table ────────────────────────────────────────────────────────────
  function renderEvents(events) {
    const tbody = document.getElementById('eventsBody');

    if (!events.length) {
      tbody.innerHTML = `
        <tr><td colspan="8">
          <div class="state-box">
            <div class="icon">&#128235;</div>
            <p>No audit events match the current filters.</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = events.map((ev, i) => {
      const sev        = (ev.severity || 'info').toLowerCase();
      const hasDetail  = ev.description || ev.metadata || ev.beforeData || ev.afterData || ev.ipAddress;
      const detailBtn  = hasDetail
        ? `<button class="detail-btn" id="drawer-btn-${i}" onclick="toggleDrawer(${i})">Details</button>
           <div class="detail-drawer" id="drawer-${i}">${buildDrawerHtml(ev)}</div>`
        : '&mdash;';

      return `<tr class="row-${esc(sev)}">
        <td>${fmtTs(ev.timestamp)}</td>
        <td>${sevBadge(sev)}</td>
        <td>${modBadge(ev.module)}</td>
        <td><span class="event-type">${escOrDash(ev.eventType)}</span></td>
        <td>${entityCell(ev)}</td>
        <td>${actorCell(ev)}</td>
        <td class="desc-cell"><div class="desc-text" title="${esc(ev.description)}">${escOrDash(ev.description)}</div></td>
        <td>${detailBtn}</td>
      </tr>`;
    }).join('');
  }

  function renderMeta(total, offset, count) {
    const from = count === 0 ? 0 : offset + 1;
    const to   = offset + count;
    const meta = count === 0
      ? 'No results'
      : `Showing ${from}–${to} of ${total > (offset + count) ? total + '+' : total}`;
    document.getElementById('resultsMeta').textContent = meta;
  }

  function renderPagination(total, offset, count) {
    const pag     = document.getElementById('pagination');
    const info    = document.getElementById('paginationInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageNum = document.getElementById('pageNum');

    pag.style.display    = 'flex';
    pageNum.textContent  = 'Page ' + (currentPage + 1);
    prevBtn.disabled     = currentPage === 0;
    nextBtn.disabled     = (offset + count) >= total;
    info.textContent     = total + ' event' + (total !== 1 ? 's' : '') + ' found';
  }

  // ── Load events ─────────────────────────────────────────────────────────────
  async function loadEvents(resetPage) {
    if (resetPage) currentPage = 0;
    openDrawerId = null;

    const params = new URLSearchParams({
      limit:  PAGE_SIZE,
      offset: currentPage * PAGE_SIZE,
    });

    const fromDate  = document.getElementById('fromDate').value;
    const toDate    = document.getElementById('toDate').value;
    const mod       = document.getElementById('modFilter').value;
    const sev       = document.getElementById('sevFilter').value;
    const evType    = document.getElementById('eventTypeFilter').value.trim();
    const userId    = document.getElementById('userIdFilter').value.trim();
    const search    = document.getElementById('searchFilter').value.trim();

    if (fromDate) params.set('fromDate', fromDate);
    if (toDate)   params.set('toDate',   toDate);
    if (mod)      params.set('module',   mod);
    if (sev)      params.set('severity', sev);
    if (evType)   params.set('eventType', evType);
    if (userId)   params.set('userId',   userId);
    if (search)   params.set('search',   search);

    const searchBtn = document.getElementById('searchBtn');
    searchBtn.disabled = true;
    searchBtn.textContent = 'Loading…';
    hideError();

    try {
      const resp = await fetch('/api/accounting/audit/events?' + params.toString(), {
        headers: authHeaders()
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        throw new Error(err.error || 'Request failed');
      }

      const data   = await resp.json();
      const events = data.events || [];
      totalCount   = data.total  || events.length;

      renderEvents(events);
      renderMeta(totalCount, currentPage * PAGE_SIZE, events.length);
      renderPagination(totalCount, currentPage * PAGE_SIZE, events.length);

      if (events.length === 0 && currentPage === 0) {
        document.getElementById('pagination').style.display = 'none';
      }

    } catch (err) {
      showError('Failed to load audit events: ' + err.message);
      document.getElementById('resultsMeta').textContent = 'Error';
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }
  }

  // ── Pagination ──────────────────────────────────────────────────────────────
  function prevPage() { if (currentPage > 0) { currentPage--; loadEvents(false); } }
  function nextPage() { currentPage++; loadEvents(false); }

  // ── Reset ───────────────────────────────────────────────────────────────────
  function resetFilters() {
    document.getElementById('fromDate').value         = '';
    document.getElementById('toDate').value           = '';
    document.getElementById('modFilter').value        = '';
    document.getElementById('sevFilter').value        = '';
    document.getElementById('eventTypeFilter').value  = '';
    document.getElementById('userIdFilter').value     = '';
    document.getElementById('searchFilter').value     = '';
    loadEvents(true);
  }

  // ── Banners ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent  = msg;
    b.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  // ── Default dates (last 7 days) + auto-load ─────────────────────────────────
  (function init() {
    const today = new Date();
    const week  = new Date(today);
    week.setDate(week.getDate() - 7);
    const fmt = d => d.toISOString().slice(0, 10);
    document.getElementById('toDate').value   = fmt(today);
    document.getElementById('fromDate').value = fmt(week);
    loadEvents(true);
  })();
</script>

</body>
</html>
